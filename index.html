<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SuriSuri</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────
       Design Tokens
    ───────────────────────────────────────── */
    :root {
      --bg:            #000000;
      --glass-bg:      rgba(22, 22, 22, 0.72);
      --glass-border:  rgba(210, 210, 210, 0.10);
      --glass-shine:   rgba(255, 255, 255, 0.055);
      --silver:        #9e9e9e;
      --silver-lt:     #c8c8c8;
      --silver-dim:    #5a5a5a;
      --cream:         #f2efe8;
      --muted:         #3a3a3a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────────
       Background — layered ambient light
    ───────────────────────────────────────── */
    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        /* upper-left cool glow */
        radial-gradient(ellipse 65% 45% at 20% -8%,
          rgba(80, 80, 80, 0.20) 0%,
          transparent 70%),
        /* lower-right warm depth */
        radial-gradient(ellipse 55% 40% at 85% 108%,
          rgba(40, 40, 40, 0.35) 0%,
          transparent 70%),
        /* center vignette */
        radial-gradient(ellipse 100% 100% at 50% 50%,
          rgba(0,0,0,0) 30%,
          rgba(0,0,0,0.60) 100%);
    }

    /* ─────────────────────────────────────────
       Page Shell
    ───────────────────────────────────────── */
    .shell {
      position: relative;
      z-index: 1;
      max-width: 430px;
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 0 24px 40px;
    }

    /* ─────────────────────────────────────────
       Header
    ───────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 54px;
      padding-bottom: 8px;
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--silver-lt);
      user-select: none;
    }
    .logo strong {
      font-weight: 700;
      color: var(--cream);
    }

    /* small glass pill — notification / status */
    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      padding: 5px 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--silver-lt);
      opacity: 0.5;
    }
    .status-text {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--silver);
    }

    /* ─────────────────────────────────────────
       Headline Section
    ───────────────────────────────────────── */
    .headline-section {
      padding: 36px 0 10px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: var(--silver-dim);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .headline {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.22;
      letter-spacing: -0.025em;
      color: var(--cream);
    }

    .headline-sub {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.65;
      color: var(--silver);
      letter-spacing: 0.01em;
    }

    /* ─────────────────────────────────────────
       Section Divider
    ───────────────────────────────────────── */
    .divider {
      height: 1px;
      margin: 32px 0 30px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(200,200,200,0.12) 20%,
        rgba(200,200,200,0.12) 80%,
        transparent 100%
      );
    }

    /* ─────────────────────────────────────────
       Action Buttons  — glass + metal
    ───────────────────────────────────────── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .action-btn {
      position: relative;
      min-height: 112px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 28px 26px;
      border-radius: 24px;
      cursor: pointer;
      text-align: left;
      overflow: hidden;

      /* glass base */
      background:
        linear-gradient(
          150deg,
          rgba(30, 30, 30, 0.85) 0%,
          rgba(12, 12, 12, 0.92) 100%
        );

      /* edge definition */
      border: 1px solid var(--glass-border);

      /* depth + glass reflection */
      box-shadow:
        /* inner top highlight — light catching rim */
        inset 0 1px 0   rgba(255,255,255,0.075),
        /* inner bottom shadow — depth */
        inset 0 -2px 6px rgba(0,0,0,0.55),
        /* inner side ambient */
        inset 1px 0 4px  rgba(255,255,255,0.02),
        /* outer lift shadow */
        0 10px 40px rgba(0,0,0,0.70),
        0 2px  8px  rgba(0,0,0,0.50),
        /* very subtle outer silver edge glow */
        0 0 0 0.5px rgba(180,180,180,0.06);

      /* glass blur */
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      transition: all 0.35s ease-in-out;
      -webkit-tap-highlight-color: transparent;
    }

    /* top metallic sheen line */
    .action-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 12%; right: 12%;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.10) 40%,
        rgba(255,255,255,0.10) 60%,
        transparent 100%
      );
    }

    /* left-side ambient light */
    .action-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: radial-gradient(
        ellipse 50% 65% at 12% 50%,
        rgba(255,255,255,0.032) 0%,
        transparent 65%
      );
      pointer-events: none;
    }

    /* ── hover: background deepens, rim brightens ── */
    .action-btn:hover {
      background:
        linear-gradient(
          150deg,
          rgba(18, 18, 18, 0.90) 0%,
          rgba(6, 6, 6, 0.96) 100%
        );
      border-color: rgba(210, 210, 210, 0.18);
      box-shadow:
        inset 0 2px 8px  rgba(0,0,0,0.80),
        inset 0 -1px 4px rgba(0,0,0,0.60),
        0 6px 24px rgba(0,0,0,0.80),
        0 1px 6px  rgba(0,0,0,0.60);
      transform: translateY(1px);
    }

    /* ── active / touch: pressed into the surface ── */
    .action-btn:active {
      background:
        linear-gradient(
          150deg,
          rgba(10, 10, 10, 0.95) 0%,
          rgba(4, 4, 4, 0.98) 100%
        );
      border-color: rgba(180, 180, 180, 0.12);
      box-shadow:
        inset 0 5px 16px rgba(0,0,0,1),
        inset 0 -1px 4px rgba(0,0,0,0.80),
        0 3px 12px rgba(0,0,0,0.90);
      transform: translateY(2px);
    }

    /* ── icon container — inset panel ── */
    .btn-icon-box {
      position: relative;
      z-index: 1;
      width: 62px; height: 62px;
      flex-shrink: 0;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--silver-lt);

      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(200,200,200,0.09);
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.65),
        inset 0 1px 0   rgba(255,255,255,0.055),
        0 1px 3px rgba(255,255,255,0.015);
    }

    /* ── text ── */
    .btn-texts {
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .btn-title {
      font-size: 19px;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: -0.015em;
      margin-bottom: 6px;
    }

    .btn-desc {
      font-size: 12px;
      font-weight: 300;
      color: var(--silver);
      letter-spacing: 0.03em;
      line-height: 1.5;
      opacity: 0.65;
    }

    /* ── chevron ── */
    .btn-chevron {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      color: var(--silver-dim);
      transition: all 0.35s ease-in-out;
    }
    .action-btn:hover .btn-chevron {
      color: var(--silver-lt);
      transform: translateX(4px);
    }

    /* ─────────────────────────────────────────
       Bottom hint
    ───────────────────────────────────────── */
    .bottom-hint {
      margin-top: 36px;
      text-align: center;
    }
    .bottom-hint-text {
      font-size: 11px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.12em;
    }
    .bottom-hint-line {
      display: inline-block;
      width: 28px;
      height: 1px;
      background: var(--muted);
      opacity: 0.4;
      vertical-align: middle;
      margin: 0 10px;
    }
  </style>
</head>
<body>

  <!-- Ambient background layers -->
  <div class="bg-layer" aria-hidden="true"></div>

  <div class="shell">

    <!-- ── Header ── -->
    <header class="header">
      <div class="logo">Suri<strong>Suri</strong></div>

      <div class="header-status" aria-label="서비스 상태">
        <span class="status-dot"></span>
        <span class="status-text">PREMIUM CARE</span>
      </div>
    </header>

    <!-- ── Headline ── -->
    <section class="headline-section">
      <p class="eyebrow">Residence Management</p>
      <h1 class="headline">무엇을<br>도와드릴까요?</h1>
      <p class="headline-sub">
        고장이나 불편한 점을 알려주시면<br>
        신속하게 처리해 드리겠습니다.
      </p>
    </section>

    <div class="divider" aria-hidden="true"></div>

    <!-- ── Action Buttons ── -->
    <section class="actions" aria-label="진단 방법 선택">

      <!-- 사진으로 진단받기 -->
      <button class="action-btn" onclick="handleCamera()" aria-label="사진으로 진단받기">
        <div class="btn-icon-box" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2
                     V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <div class="btn-texts">
          <div class="btn-title">사진으로 진단받기</div>
          <div class="btn-desc">고장 부위를 촬영하면<br>바로 접수됩니다</div>
        </div>
        <svg class="btn-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <!-- 음성으로 진단받기 -->
      <button class="action-btn" onclick="handleVoice()" aria-label="음성으로 진단받기">
        <div class="btn-icon-box" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8"  y1="23" x2="16" y2="23"/>
          </svg>
        </div>
        <div class="btn-texts">
          <div class="btn-title">음성으로 진단받기</div>
          <div class="btn-desc">말씀해 주시면<br>바로 접수해 드립니다</div>
        </div>
        <svg class="btn-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

    </section>

    <!-- ── Bottom Hint ── -->
    <div class="bottom-hint">
      <span class="bottom-hint-line"></span>
      <span class="bottom-hint-text">24시간 접수 가능</span>
      <span class="bottom-hint-line"></span>
    </div>

  </div><!-- /.shell -->

  <script>
    function handleCamera() {
      // 추후 카메라 플로우 연결
      console.log('[SuriSuri] 사진 진단 시작');
    }

    function handleVoice() {
      // 추후 음성 플로우 연결
      console.log('[SuriSuri] 음성 진단 시작');
    }
  </script>

</body>
</html>
